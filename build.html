<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Your Camp</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="home-header">
  <h1>Build Your Camp</h1>
  <p>Create your digital deer camp</p>
</header>

<section class="features">

  <h2 class="features-title">Create Your Camp</h2>
  <p class="features-sub">Fill this out and build instantly</p>

  <form id="campForm">

    <label>Camp Name</label>
    <input type="text" id="name" required>

    <label>Location</label>
    <input type="text" id="location">

    <label>Established Year</label>
    <input type="number" id="established">

    <label>Hero Image Filename</label>
    <input type="text" id="hero" placeholder="e.g. red-oak.jpg">

    <label>Members (comma separated)</label>
    <input type="text" id="members" placeholder="Ben, Dave, Tyler">

    <label>Traditions (comma separated)</label>
    <input type="text" id="traditions">

    <label>Memories (comma separated)</label>
    <input type="text" id="memories">

    <button type="button" class="cta" onclick="generateCamp()">Build My Camp</button>

  </form>

</section>

<footer class="footer">
  <img src="assets/branding/deercamp-footer.png" class="footer-logo">
  <p>Built for the Tradition</p>
</footer>

<script>
function generateCamp() {

  const data = {
    name: document.getElementById("name").value,
    location: document.getElementById("location").value,
    established: document.getElementById("established").value,
    hero: document.getElementById("hero").value,
    members: document.getElementById("members").value.split(",").map(x => x.trim()),
    traditions: document.getElementById("traditions").value.split(",").map(x => x.trim()),
    memories: document.getElementById("memories").value.split(",").map(x => x.trim())
  };

  // 🔥 Save to browser
  localStorage.setItem("deerCampData", JSON.stringify(data));

  // 🔥 Redirect
  window.location.href = "camp.html";
}
</script>

</body>
</html>
