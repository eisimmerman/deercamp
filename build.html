<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Build Your Camp</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-container">

  <h1>Create Your Camp</h1>
  <p>Fill this out and build instantly</p>

  <form id="campForm">

    <!-- CAMP NAME -->
    <label>Camp Name</label>
    <input type="text" id="name" placeholder="Camp Name" required>

    <!-- LOCATION -->
    <label>Location</label>
    <input type="text" id="location" placeholder="City, State" required>

    <!-- YEAR -->
    <label>Established Year</label>
    <input type="number" id="year" placeholder="e.g. 1984" min="1800" max="2099">

    <!-- HERO SELECT -->
    <label>Select Hero Image</label>
    <select id="heroSelect">
      <option value="classic.jpg">Classic Camp</option>
      <option value="pines.jpg">Pine Woods</option>
      <option value="snow.jpg">Snow Camp</option>
      <option value="cabin.jpg">Cabin Camp</option>
    </select>

    <!-- UPLOAD OPTION -->
    <label>Or Upload Your Own Camp Image</label>
    <input type="file" id="heroUpload" accept="image/*">

    <!-- MEMBERS -->
    <label>CampMembers (comma separated)</label>
    <input type="text" id="members" placeholder="Ben, Dave, Tyler">

    <!-- TRADITIONS -->
    <label>CampTraditions (comma separated)</label>
    <input type="text" id="traditions" placeholder="Opening night chili, First buck cigar">

    <!-- MEMORIES -->
    <label>CampMemories (comma separated)</label>
    <input type="text" id="memories" placeholder="First buck, Big storm hunt">

    <!-- SUBMIT -->
    <button type="submit" class="cta">Build My Camp</button>

  </form>

</div>

<script>
document.getElementById("campForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const data = {
    name: document.getElementById("name").value,
    location: document.getElementById("location").value,
    established: document.getElementById("year").value,
    hero: document.getElementById("heroSelect").value,
    members: document.getElementById("members").value.split(","),
    traditions: document.getElementById("traditions").value.split(","),
    memories: document.getElementById("memories").value.split(",")
  };

  localStorage.setItem("campData", JSON.stringify(data));

  window.location.href = "camp.html";
});
</script>

</body>
</html>
