<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Build Your Camp</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="build-container">

  <h1>Create Your Camp</h1>
  <p class="subtitle">Build your Deer Camp in minutes — no setup required</p>

  <form id="campForm">

    <div class="form-section">
      <h2>Camp Info</h2>

      <div class="form-row">
        <label>Camp Name</label>
        <input id="campName" placeholder="Camp Name">
      </div>

      <div class="form-row">
        <label>City</label>
        <input id="campCity" placeholder="City">
      </div>

      <div class="form-row">
        <label>State</label>
        <input id="campState" placeholder="State">
      </div>

      <div class="form-row">
        <label>Zip Code</label>
        <input id="campZip" placeholder="Zip Code">
      </div>

      <div class="form-row">
        <label>Established</label>
        <input id="campYear" placeholder="e.g. 1984">
      </div>
    </div>

    <div class="form-section">
      <h2>Camp Image</h2>

      <div class="form-row">
        <label>Select Image</label>
        <select id="campImageSelect">
          <option value="classic.jpg">Classic Camp</option>
          <option value="woods.jpg">Woods Camp</option>
        </select>
      </div>

      <div class="form-row">
        <label>Upload Image</label>
        <input type="file" id="campImageUpload" accept="image/*">
      </div>
    </div>

    <div class="form-section">
      <h2>People & Traditions</h2>

      <div class="form-row">
        <label>Members</label>
        <input id="campMembers" placeholder="Ben, Dave, Tyler">
      </div>

      <div class="form-row">
        <label>Traditions</label>
        <input id="campTraditions" placeholder="Opening night chili, First buck cigar">
      </div>

      <div class="form-row">
        <label>Deer Drives</label>
        <input id="campDeerDrives" placeholder="North Ridge Push, Creek Line">
      </div>
    </div>

    <div class="form-section">
      <h2>Memories & Recipes</h2>

      <div class="form-row">
        <label>Memories</label>
        <input id="campMemories" placeholder="First buck, Big storm hunt">
      </div>

      <div class="form-row">
        <label>Recipes</label>
        <input id="campRecipes" placeholder="Venison chili, Backstrap">
      </div>
    </div>

    <button type="submit" class="build-btn">Build My Camp</button>

  </form>

</div>

<script src="build.js"></script>
<script>
function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error("Could not read uploaded image."));
    reader.readAsDataURL(file);
  });
}

document.getElementById("campForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const name = document.getElementById("campName").value.trim();
  const city = document.getElementById("campCity").value.trim();
  const state = document.getElementById("campState").value.trim();
  const zip = document.getElementById("campZip").value.trim();
  const year = document.getElementById("campYear").value.trim();

  const members = document.getElementById("campMembers").value
    .split(",")
    .map(item => item.trim())
    .filter(Boolean);

  const memberProfiles = members.map(name => ({
    name,
    role: "Camp Member",
    yearJoined: "—",
    favoriteStand: "—",
    note: "Add member details later."
  }));

  const traditions = document.getElementById("campTraditions").value
    .split(",")
    .map(item => item.trim())
    .filter(Boolean);

  const deerDrives = document.getElementById("campDeerDrives").value
    .split(",")
    .map(item => item.trim())
    .filter(Boolean);

  const memories = document.getElementById("campMemories").value
    .split(",")
    .map(item => item.trim())
    .filter(Boolean);

  const recipes = document.getElementById("campRecipes").value
    .split(",")
    .map(item => item.trim())
    .filter(Boolean);

  const selectImage = document.getElementById("campImageSelect").value;
  const uploadInput = document.getElementById("campImageUpload");

  let hero = selectImage;

  if (uploadInput.files.length > 0) {
    try {
      hero = await readFileAsDataURL(uploadInput.files[0]);
    } catch (error) {
      alert("Uploaded image could not be processed. Using selected image instead.");
      hero = selectImage;
    }
  }

  const location = [city, state].filter(Boolean).join(", ");

  const campData = {
    name,
    city,
    state,
    zip,
    location,
    established: year,
    hero,
    members,
    memberProfiles,
    traditions,
    deerDrives,
    memories,
    recipes
  };

  localStorage.setItem("campData", JSON.stringify(campData));
  window.location.href = "camp.html";
});
</script>
</body>
</html>
