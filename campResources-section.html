<section id="campresources" class="content-section campresources-section">
  <div class="campresources-top">
    <div class="campresources-intro">
      <h2>📍 CampResources</h2>
      <p class="section-helper">Find nearby fuel, food, supplies, repairs, and other local services within your selected search radius.</p>
    </div>

    <div class="campresources-controls">
      <label class="form-row">
        <span class="label">Camp ZIP</span>
        <input id="campResourcesZip" class="input" type="text" inputmode="numeric" placeholder="e.g., 54732" maxlength="10">
      </label>

      <label class="form-row campresources-radius-field">
        <span class="label">Search Radius</span>
        <select id="campResourcesRadius" class="select">
          <option value="25" selected>25 miles</option>
          <option value="50">50 miles</option>
          <option value="75">75 miles</option>
          <option value="100">100 miles</option>
        </select>
      </label>
    </div>
  </div>

  <div id="campResourcesCategories" class="campresources-chips" aria-label="CampResources categories"></div>
  <div id="campResourcesStatus" class="feedback">Loading nearby resources...</div>
  <div id="campResourcesList" class="campresources-list"></div>
</section>
