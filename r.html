<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Opening DeerCamp…</title>
  <style>
    :root {
      --paper: #f7f1e5;
      --ink: #231a13;
      --brown: #6a4427;
      --green: #2f5d3a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.35), transparent 42%),
        linear-gradient(180deg, #ddd3c3 0%, #cfc1aa 100%);
    }

    .card {
      width: min(100%, 560px);
      padding: 28px;
      border-radius: 24px;
      background: rgba(247, 241, 229, 0.96);
      border: 1px solid rgba(106, 68, 39, 0.16);
      box-shadow: 0 16px 36px rgba(0,0,0,0.16);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: #402717;
    }

    p {
      margin: 0 0 18px;
      line-height: 1.55;
      color: #5a4331;
      font-size: 1rem;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 999px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }

    .small {
      display: block;
      margin-top: 14px;
      color: #6a6157;
      font-size: 0.9rem;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Opening DeerCamp…</h1>
    <p>Taking you to the free DeerCamp builder.</p>
    <a id="redirectLink" class="button" href="/build.html">Continue to DeerCamp</a>
    <span id="redirectNote" class="small"></span>
  </main>

  <script>
    (function redirectDeerCampCampaignLink() {
      const pathParts = window.location.pathname.split('/').filter(Boolean);
      const rawSlug = pathParts[pathParts.length - 1] || '';
      const slug = rawSlug.trim().toLowerCase();
      const campaignId = slug ? slug.toUpperCase() : '';

      const existing = new URLSearchParams(window.location.search || '');
      const params = new URLSearchParams();

      if (campaignId) {
        params.set('ref', campaignId);
        params.set('campaignId', campaignId);
        params.set('cid', campaignId);
        params.set('dc_campaign', campaignId);
        params.set('utm_content', campaignId);
        params.set('prospectId', campaignId);
      }

      const isWiTavern = /^wi-tavern-\d{3}$/i.test(slug);
      if (isWiTavern) {
        params.set('utm_source', 'wi-tavern');
        params.set('utm_medium', 'qr-poster');
        params.set('utm_campaign', 'wi-tavern-partners');
        params.set('utm_term', 'partner-qr');
        params.set('channel', 'qr');
        params.set('source', 'wi-tavern');
        params.set('medium', 'qr-poster');
        params.set('campaignName', 'WI Tavern Partners');
        params.set('campaignType', 'Tavern Partner QR Poster');
      } else if (slug) {
        params.set('utm_source', 'partner');
        params.set('utm_medium', 'short-link');
        params.set('utm_campaign', slug);
        params.set('channel', 'short-link');
        params.set('source', 'partner');
        params.set('medium', 'short-link');
      }

      existing.forEach((value, key) => {
        if (value && !params.has(key)) params.set(key, value);
      });

      const destination = new URL('/build.html', window.location.origin);
      params.forEach((value, key) => destination.searchParams.set(key, value));

      const link = document.getElementById('redirectLink');
      const note = document.getElementById('redirectNote');
      if (link) link.setAttribute('href', destination.pathname + destination.search);
      if (note) note.textContent = campaignId ? `Campaign: ${campaignId}` : 'No campaign code found.';

      window.location.replace(destination.toString());
    })();
  </script>
</body>
</html>
