<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening DeerCamp...</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#d7ccb9;color:#231a13;font-family:Arial,Helvetica,sans-serif}
    .card{max-width:560px;margin:24px;padding:28px;border-radius:24px;background:#f7f1e7;border:1px solid rgba(69,42,22,.12);box-shadow:0 14px 34px rgba(0,0,0,.12);text-align:center}
    h1{margin:0 0 10px;color:#452a16}p{margin:0;color:#6b5644;line-height:1.55}.btn{display:inline-flex;align-items:center;justify-content:center;margin-top:18px;min-height:44px;padding:0 16px;border-radius:999px;background:#6a4427;color:#fff;text-decoration:none;font-weight:800}
  </style>
  <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore-compat.js"></script>
  <script src="/firebase-web.js"></script>
</head>
<body>
  <main class="card">
    <h1>Opening DeerCamp...</h1>
    <p id="status">Looking up this DeerCamp short link.</p>
    <a id="fallbackLink" class="btn" href="/build.html" hidden>Open DeerCamp</a>
  </main>
  <script>
    function getShortCode(){
      const path = String(window.location.pathname || "");
      const match = path.match(/\/r\/([^/?#]+)/i);
      if (match && match[1]) return decodeURIComponent(match[1]);
      const params = new URLSearchParams(window.location.search || "");
      return String(params.get("code") || params.get("c") || "").trim();
    }
    async function openShortLink(){
      const code = getShortCode();
      const status = document.getElementById("status");
      const fallback = document.getElementById("fallbackLink");
      if (!code) { status.textContent = "This short link is missing a code."; fallback.hidden = false; return; }
      try {
        const link = window.DeerCampCloud && typeof DeerCampCloud.getShortLink === "function" ? await DeerCampCloud.getShortLink(code) : null;
        if (!link || !link.destinationUrl || link.active === false) {
          status.textContent = "This DeerCamp short link was not found or is no longer active.";
          fallback.hidden = false;
          return;
        }
        try { await DeerCampCloud.recordShortLinkClick(code, { path: window.location.pathname, referrer: document.referrer }); } catch (error) {}
        status.textContent = "Opening DeerCamp now...";
        window.location.replace(link.destinationUrl);
      } catch (error) {
        console.warn(error);
        status.textContent = "Could not open this DeerCamp short link. Try the main DeerCamp builder.";
        fallback.hidden = false;
      }
    }
    openShortLink();
  </script>
</body>
</html>
