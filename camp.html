<script>

const params = new URLSearchParams(window.location.search);

function renderCamp(data){

document.getElementById("campName").innerText = data.name || "";

document.getElementById("campMeta").innerText =
(data.location || "") +
(data.established ? " • Est. " + data.established : "");

if(data.members){
document.getElementById("campMembers").innerText =
data.members.join(" • ");
}

document.getElementById("heroImage").src =
"/assets/heroes/" + data.hero;

/* traditions */

if(data.traditions && data.traditions.length){

document.getElementById("traditionsPanel").style.display="block";

const list = document.getElementById("traditionsList");

list.innerHTML="";

data.traditions.forEach(item =>{

const li = document.createElement("li");
li.textContent = item;
list.appendChild(li);

});

}

/* members panel */

if(data.members && data.members.length){

document.getElementById("membersPanel").style.display="block";

const list = document.getElementById("membersList");

list.innerHTML="";

data.members.forEach(member =>{

const li = document.createElement("li");
li.textContent = member;
list.appendChild(li);

});

}

}

/* PREVIEW MODE */

if(params.get("preview")){

const previewData = JSON.parse(localStorage.getItem("previewCamp"));

renderCamp(previewData);

}

/* NORMAL MODE */

else{

const campSlug = params.get("camp");

fetch("/camps/" + campSlug + ".json")

.then(res => res.json())

.then(data => renderCamp(data));

}

</script>
