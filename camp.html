<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeerCamp</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- ================= HEADER ================= -->

<header class="camp-header">
  <div class="header-inner">

    <div class="header-left">
      <img src="assets/images/deer-track.png" class="deer-icon">
    </div>

    <div class="header-center">
      <div id="campName" class="camp-title"></div>
      <div id="campMeta" class="camp-meta"></div>
      <div id="campMembers" class="camp-members"></div>
    </div>

    <div class="header-right">
      <button id="menuToggle" class="menu-btn">☰ Menu</button>
    </div>

  </div>

  <!-- DROPDOWN MENU -->
  <nav id="menu" class="menu hidden"></nav>
</header>

<!-- ================= HERO ================= -->

<section class="hero">
  <img id="heroImage">
</section>

<!-- ================= MAIN CONTENT ================= -->

<main class="page">
  <div id="sections"></div>
</main>

<!-- ================= FOOTER ================= -->

<footer class="camp-footer">
  <div class="footer-inner">
    <div class="footer-logo">DeerCamp</div>
    <div class="footer-tag">Built for the Tradition</div>
  </div>
</footer>

<!-- ================= SCRIPT ================= -->

<script>

// ===== GET CAMP FROM URL =====

const params = new URLSearchParams(window.location.search);
const campSlug = params.get("camp") || "red-oak-camp";

// ===== LOAD CAMP DATA =====

fetch("camps/" + campSlug + ".json")
  .then(res => res.json())
  .then(data => {

    // HEADER CONTENT

    document.getElementById("campName").textContent = data.name;

    document.getElementById("campMeta").textContent =
      data.location + " • Est. " + data.established;

    document.getElementById("campMembers").textContent =
      (data.members || []).join(" • ");

    // HERO IMAGE

    document.getElementById("heroImage").src =
      "assets/heroes/" + data.hero;

    // MENU + SECTIONS

    const menu = document.getElementById("menu");
    const sections = document.getElementById("sections");

    function addSection(title, contentHTML, id) {

      // MENU LINK
      const link = document.createElement("a");
      link.textContent = title;
      link.href = "#" + id;
      menu.appendChild(link);

      // SECTION BLOCK
      const section = document.createElement("section");
      section.id = id;
      section.innerHTML = `<h2>${title}</h2>${contentHTML}`;
      sections.appendChild(section);
    }

    // MEMBERS

    if (data.members) {
      addSection(
        "Camp Members",
        `<p>${data.members.join(" • ")}</p>`,
        "members"
      );
    }

    // MAP

    if (data.map) {
      addSection(
        "Camp Map",
        `<img src="${data.map}" class="camp-map">`,
        "map"
      );
    }

    // MEMORIES

    if (data.memories) {
      addSection(
        "Camp Memories",
        `<ul>${data.memories.map(m => `<li>${m}</li>`).join("")}</ul>`,
        "memories"
      );
    }

    // TRADITIONS

    if (data.traditions) {
      addSection(
        "Camp Traditions",
        `<ul>${data.traditions.map(t => `<li>${t}</li>`).join("")}</ul>`,
        "traditions"
      );
    }

  });

// ===== MENU TOGGLE =====

const menuToggle = document.getElementById("menuToggle");
const menu = document.getElementById("menu");

menuToggle.addEventListener("click", () => {
  menu.classList.toggle("hidden");
});

</script>

</body>
</html>
