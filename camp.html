<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#e6dccd;
margin:0;
}

.wrap{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.camp-hero{
width:100%;
height:420px;
object-fit:cover;
border-radius:16px;
}

.camp-header{
text-align:center;
margin-top:30px;
}

.camp-name{
font-size:42px;
font-weight:700;
}

.camp-location{
opacity:.8;
margin-top:6px;
}

.camp-members{
margin-top:10px;
font-size:16px;
opacity:.75;
}

.section{
margin-top:60px;
}

.section h2{
font-size:32px;
margin-bottom:16px;
}

</style>

</head>

<body>

<div class="wrap">

<img id="heroImage" class="camp-hero">

<div class="camp-header">

<div id="campName" class="camp-name"></div>

<div id="campLocation" class="camp-location"></div>

<div id="campMembers" class="camp-members"></div>

</div>


<div class="section">

<h2>Camp Traditions</h2>

<h3 id="traditionName"></h3>

<p id="traditionDescription"></p>

</div>

</div>


<script>

const params = new URLSearchParams(window.location.search);

const campSlug = params.get("camp");

fetch("/camps/" + campSlug + ".json")

.then(res => res.json())

.then(data => {

document.getElementById("campName").innerText = data.campName;

document.getElementById("campLocation").innerText =
data.location + " • Est. " + data.established;

document.getElementById("campMembers").innerText =
data.members.join(" • ");

document.getElementById("heroImage").src =
"/assets/heroes/" + data.hero;

document.getElementById("traditionName").innerText =
data.traditions.name;

document.getElementById("traditionDescription").innerText =
data.traditions.description;

});

</script>

</body>
</html>
