<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeerCamp</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<!-- ================= HEADER ================= -->

<header class="camp-header">
  <div class="header-inner">

    <div class="header-left">
      <img src="assets/images/deer-track.png" class="deer-icon">
    </div>

    <div class="header-center">
      <div id="campName" class="camp-title"></div>
      <div id="campMeta" class="camp-meta"></div>
      <div id="campMembers" class="camp-members"></div>
    </div>

    <div class="header-right">
      <button id="menuToggle" class="menu-btn">☰ Menu</button>
    </div>

  </div>

  <nav id="menu" class="menu hidden"></nav>
</header>

<!-- ================= HERO ================= -->

<section class="hero">
  <img id="heroImage">
</section>

<!-- ================= MAIN CONTENT ================= -->

<main class="page">
  <div id="sections"></div>
</main>

<!-- ================= FOOTER ================= -->

<footer class="camp-footer">
  <div class="footer-inner">
    <div class="footer-tag">Built for the Tradition</div>
  </div>
</footer>

<!-- ================= SCRIPT ================= -->

<script>

// ===== GET CAMP FROM URL =====

const params = new URLSearchParams(window.location.search);
const campSlug = params.get("camp") || "red-oak-camp";

// ===== LOAD CAMP DATA =====

fetch("camps/" + campSlug + ".json")
  .then(res => res.json())
  .then(data => {

    // HEADER

    document.getElementById("campName").textContent = data.name;

    document.getElementById("campMeta").textContent =
      data.location + " • Est. " + data.established;

    // HERO

    document.getElementById("heroImage").src =
      "assets/heroes/" + data.hero;

    const menu = document.getElementById("menu");
    const sections = document.getElementById("sections");

    // ===== SECTION ENGINE =====

    data.sections.forEach((sectionData, index) => {

      const id = "section-" + index;

      // MENU LINK
      const link = document.createElement("a");
      link.textContent = sectionData.title;
      link.href = "#" + id;
      menu.appendChild(link);

      // BUILD CONTENT
      let content = "";

      if (sectionData.type === "members") {
        content = `<p>${sectionData.data.join(" • ")}</p>`;
        document.getElementById("campMembers").textContent =
          sectionData.data.join(" • ");
      }

      if (sectionData.type === "list") {
        content = `<ul>${sectionData.data.map(item => `<li>${item}</li>`).join("")}</ul>`;
      }

      if (sectionData.type === "map") {
        content = `<img src="${sectionData.src}" class="camp-map">`;
      }

      // CREATE SECTION
      const section = document.createElement("section");
      section.id = id;
      section.innerHTML = `<h2>${sectionData.title}</h2>${content}`;

      sections.appendChild(section);

    });

  });

// ===== MENU TOGGLE =====

document.getElementById("menuToggle").addEventListener("click", () => {
  document.getElementById("menu").classList.toggle("hidden");
});

</script>

</body>
</html>
