<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeerCamp</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="camp-header">
  <div class="header-inner">

    <div class="header-left">
      <img src="assets/images/deer-track.png" class="deer-icon"/>
    </div>

    <div class="header-center">
      <div class="camp-title" id="campName">Camp Name</div>
      <div class="camp-meta" id="campLocation"></div>
      <div id="campMembers" class="camp-members"></div>
    </div>

    <div class="header-right">
      <button class="menu-btn">☰ Menu</button>
    </div>

  </div>
</header>

<section class="hero">
  <img id="heroImage" src="assets/heroes/classic.jpg">
</section>

<section class="content">
  <h2>Camp Traditions</h2>
  <ul id="traditions"></ul>

  <h2>Camp Memories</h2>
  <ul id="memories"></ul>
</section>

<footer class="footer">
  <img src="assets/branding/deercamp-footer.png" class="footer-logo">
  <p>Built for the Tradition</p>
</footer>

<script>

// 🔥 LOAD DATA
let data = localStorage.getItem("deerCampData");

if (data) {
  data = JSON.parse(data);
  renderCamp(data);
} else {
  console.log("No local camp data found.");
}

// 🔥 RENDER FUNCTION
function renderCamp(data) {

  document.getElementById("campName").textContent = data.name || "Camp Name";
  document.getElementById("campLocation").textContent = data.location || "";

  document.getElementById("heroImage").src =
    "assets/heroes/" + (data.hero || "classic.jpg");

  document.getElementById("campMembers").innerHTML =
    (data.members || []).map(m => `<span>${m}</span>`).join("");

  document.getElementById("traditions").innerHTML =
    (data.traditions || []).map(t => `<li>${t}</li>`).join("");

  document.getElementById("memories").innerHTML =
    (data.memories || []).map(m => `<li>${m}</li>`).join("");
}

</script>

</body>
</html>
