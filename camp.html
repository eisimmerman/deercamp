<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#cfc3af;
}

/* hero */

.hero img{
width:100%;
height:320px;
object-fit:cover;
}

/* card */

.container{
max-width:900px;
margin:-60px auto 40px;
background:white;
border-radius:20px;
padding:40px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

/* nav */

.camp-nav{
display:flex;
gap:20px;
justify-content:center;
margin-bottom:25px;
font-weight:600;
}

.camp-nav a{
cursor:pointer;
color:#7b5734;
}

/* header */

h1{
text-align:center;
margin-top:0;
}

.meta{
text-align:center;
color:#666;
margin-bottom:15px;
}

.members{
text-align:center;
margin-bottom:30px;
}

/* lists */

ul{
line-height:1.8;
}

.publish{
margin-top:30px;
text-align:center;
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#7b5734;
color:white;
font-size:15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="hero">
<img id="heroImage">
</div>

<div class="container">

<div class="camp-nav">

<a id="navHome">Home</a>
<a id="navMembers">Members</a>
<a id="navTraditions">Traditions</a>
<a id="navMemories">Memories</a>
<a id="navMap">Camp Map</a>

</div>

<h1 id="campName"></h1>

<div class="meta" id="campMeta"></div>

<div class="members" id="campMembers"></div>

<h2>Camp Traditions</h2>

<ul id="traditions"></ul>

<div id="publishSection" class="publish"></div>

</div>

<script>

function renderCamp(data){

document.getElementById("heroImage").src =
"assets/heroes/" + data.hero

document.getElementById("campName").innerText =
data.name

document.getElementById("campMeta").innerText =
data.location + " • Est. " + data.established

document.getElementById("campMembers").innerText =
data.members.join(" • ")

const list = document.getElementById("traditions")

data.traditions.forEach(t => {

const li = document.createElement("li")
li.innerText = t
list.appendChild(li)

})

}

/* preview or normal load */

const params = new URLSearchParams(window.location.search)
const slug = params.get("camp")

if(slug === "preview"){

const data =
JSON.parse(localStorage.getItem("generatedCamp"))

renderCamp(data)

createPublishButton(data)

}else{

fetch("camps/" + slug + ".json")
.then(r => r.json())
.then(data=>{
renderCamp(data)
setupNav(slug)
})

}

/* publish button */

function createPublishButton(camp){

const btn = document.createElement("button")

btn.innerText="Publish My DeerCamp"

btn.onclick=function(){

const json = JSON.stringify(camp,null,2)

const url =
"https://github.com/eisimmerman/deercamp/new/main/camps?filename=" +
camp.slug + ".json&value=" + encodeURIComponent(json)

window.open(url,"_blank")

}

document.getElementById("publishSection").appendChild(btn)

}

/* nav */

function setupNav(slug){

document.getElementById("navHome").onclick =
()=> window.location="camp.html?camp="+slug

document.getElementById("navMembers").onclick =
()=> window.location="members.html?camp="+slug

document.getElementById("navTraditions").onclick =
()=> window.location="traditions.html?camp="+slug

document.getElementById("navMemories").onclick =
()=> window.location="memories.html?camp="+slug

document.getElementById("navMap").onclick =
()=> window.location="map.html?camp="+slug

}

</script>

</body>
</html>
