<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="camp-header">

  <div class="header-bar">

    <div class="header-left">
      <img src="assets/branding/deer-track.png" class="deer-icon">
    </div>

    <div class="header-center">
      <h1 id="campName"></h1>
      <p id="campLocation"></p>
      <div id="campMembers" class="members"></div>
    </div>

    <div class="header-right">
      <img id="heroImage">
    </div>

  </div>

</header>

<!-- 🔥 BEST STAND DISPLAY -->

<div class="best-stand" id="bestStandBox">
  🏆 Best Stand: Calculating...
</div>

<main class="content">

  <section>
    <h2>Camp Map</h2>

    <div class="map-container" id="mapContainer">
      <img id="campMap">
    </div>

  </section>

</main>

<!-- MODAL -->

<div id="mapModal" class="modal">
  <div class="modal-content">

    <span class="close">&times;</span>

    <h3 id="modalTitle"></h3>
    <p id="modalNotes"></p>

    <hr>

    <h4>Log Sighting</h4>

    <input id="deerCount" type="number" placeholder="Number of deer">
    <input id="notesInput" type="text" placeholder="Notes">

    <button id="saveBtn">Save</button>

    <hr>

    <h4>Stand Stats</h4>
    <p id="totalDeer"></p>
    <p id="totalLogs"></p>
    <p id="avgDeer"></p>

    <hr>

    <h4>History</h4>
    <ul id="historyList"></ul>

  </div>
</div>

<footer class="footer">
  <img src="assets/branding/deercamp-footer.png" class="footer-image">
</footer>

<script>

const params = new URLSearchParams(window.location.search);
const campSlug = params.get("camp");

let currentStandId = null;
let allStands = [];

fetch(`data/${campSlug}.json`)
  .then(res => res.json())
  .then(data => {

    document.getElementById("campName").textContent = data.name;
    document.getElementById("campLocation").textContent =
      `${data.location} • Est. ${data.established}`;

    document.getElementById("heroImage").src =
      "assets/heroes/" + data.hero;

    document.getElementById("campMap").src =
      data.map;

    const mapContainer = document.getElementById("mapContainer");

    allStands = data.stands;

    data.stands.forEach(stand => {

      const pin = document.createElement("div");
      pin.className = "map-pin";

      pin.style.top = stand.top;
      pin.style.left = stand.left;

      pin.dataset.id = stand.id;
      pin.dataset.name = stand.name;
      pin.dataset.notes = stand.notes;

      mapContainer.appendChild(pin);

    });

    setupPins();
    calculateBestStand();

  });

function setupPins() {

  const pins = document.querySelectorAll(".map-pin");
  const modal = document.getElementById("mapModal");

  pins.forEach(pin => {
    pin.addEventListener("click", () => {

      currentStandId = pin.dataset.id;

      document.getElementById("modalTitle").textContent = pin.dataset.name;
      document.getElementById("modalNotes").textContent = pin.dataset.notes;

      loadHistory();
      loadStats();

      modal.style.display = "flex";
    });
  });

  document.querySelector(".close").onclick = () =>
    modal.style.display = "none";
}

/* SAVE */

document.getElementById("saveBtn").onclick = () => {

  const count = Number(document.getElementById("deerCount").value || 0);
  const notes = document.getElementById("notesInput").value;

  const entry = {
    date: new Date().toLocaleString(),
    count,
    notes
  };

  const key = "stand_" + currentStandId;

  const existing = JSON.parse(localStorage.getItem(key)) || [];
  existing.push(entry);

  localStorage.setItem(key, JSON.stringify(existing));

  loadHistory();
  loadStats();
  calculateBestStand();
};

/* HISTORY */

function loadHistory() {

  const list = document.getElementById("historyList");
  list.innerHTML = "";

  const key = "stand_" + currentStandId;
  const data = JSON.parse(localStorage.getItem(key)) || [];

  data.forEach(item => {
    const li = document.createElement("li");
    li.textContent = `${item.date} - ${item.count} deer (${item.notes})`;
    list.appendChild(li);
  });

}

/* STATS */

function loadStats() {

  const key = "stand_" + currentStandId;
  const data = JSON.parse(localStorage.getItem(key)) || [];

  let total = 0;

  data.forEach(entry => total += entry.count);

  const logs = data.length;
  const avg = logs ? (total / logs).toFixed(1) : 0;

  document.getElementById("totalDeer").textContent = "Total Deer Seen: " + total;
  document.getElementById("totalLogs").textContent = "Total Logs: " + logs;
  document.getElementById("avgDeer").textContent = "Avg per Sit: " + avg;

}

/* 🔥 BEST STAND ENGINE */

function calculateBestStand() {

  let best = null;
  let bestScore = 0;

  allStands.forEach(stand => {

    const key = "stand_" + stand.id;
    const data = JSON.parse(localStorage.getItem(key)) || [];

    if (data.length === 0) return;

    let total = 0;
    data.forEach(entry => total += entry.count);

    const avg = total / data.length;

    if (avg > bestScore) {
      bestScore = avg;
      best = stand;
    }

  });

  const box = document.getElementById("bestStandBox");

  if (best) {
    box.textContent =
      `🏆 Best Stand Today: ${best.name} (${bestScore.toFixed(1)} avg)`;
  } else {
    box.textContent = "🏆 Best Stand: No data yet";
  }

}

</script>

</body>
</html>
