<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp</title>

<style>

body{
margin:0;
background:#e6dccd;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

/* overall page width */

.wrap{
max-width:900px;
margin:auto;
padding:40px 20px;
}

/* entire camp frame */

.frame{
background:#f3ecdf;
border-radius:28px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
overflow:hidden;
}

/* wood banner */

.banner{
background:#7b5a38;
color:white;
text-align:center;
padding:18px 20px;
}

.banner h1{
margin:0;
font-size:32px;
}

.banner .meta{
margin-top:6px;
opacity:.9;
font-size:14px;
}

/* hero image */

.hero{
width:100%;
height:340px;
object-fit:cover;
}

/* parchment content */

.content{
padding:40px;
}

/* members line */

.members{
margin-top:10px;
font-size:16px;
opacity:.8;
text-align:center;
}

/* section */

.section{
margin-top:40px;
}

.section h2{
margin-top:0;
}

/* traditions list */

.section ul{
line-height:1.7;
}

/* footer forest */

.footer{
text-align:center;
padding:20px;
font-size:14px;
opacity:.6;
}

</style>

</head>

<body>

<div class="wrap">

<div class="frame">

<div class="banner">

<h1 id="campName"></h1>

<div id="campMeta" class="meta"></div>

<div id="campMembers" class="members"></div>

</div>

<img id="heroImage" class="hero">

<div class="content">

<div class="section">

<h2>Camp Traditions</h2>

<ul id="traditionsList"></ul>

</div>

</div>

<div class="footer">

DeerCamp • Preserve the memories of camp

</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

function renderCamp(data){

document.getElementById("campName").innerText = data.name;

document.getElementById("campMeta").innerText =
data.location + " • Est. " + data.established;

document.getElementById("campMembers").innerText =
data.members.join(" • ");

document.getElementById("heroImage").src =
"assets/heroes/" + data.hero;

const list = document.getElementById("traditionsList");

list.innerHTML="";

data.traditions.forEach(t =>{

const li = document.createElement("li");
li.textContent = t;
list.appendChild(li);

});

}

/* preview mode */

if(params.get("preview")){

const data = JSON.parse(localStorage.getItem("previewCamp"));

renderCamp(data);

}

/* normal camp */

else{

const slug = params.get("camp");

fetch("camps/" + slug + ".json")

.then(res => res.json())

.then(data => renderCamp(data));

}

</script>

</body>
</html>
