<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camp</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER (LOCKED) -->
<header class="camp-header">
  <div class="header-inner">

    <div class="header-left">
      <img src="assets/images/deer-track.png" class="deer-icon">
    </div>

    <div class="header-center">
      <div id="campName" class="camp-title"></div>
      <div id="campLocation" class="camp-meta"></div>
      <div id="campMembers" class="camp-members"></div>
    </div>

    <div class="header-right">
      <button class="menu-btn">☰ Menu</button>
    </div>

  </div>
</header>

<!-- HERO (CONTROLLED SIZE) -->
<section class="hero">
  <img id="heroImage">
</section>

<!-- CONTENT (PARchment FEEL) -->
<div class="content">

  <div class="section">
    <h2>CampTraditions</h2>
    <ul id="traditionsList"></ul>
  </div>

  <div class="section">
    <h2>CampMemories</h2>
    <ul id="memoriesList"></ul>
  </div>

</div>

<!-- FOOTER -->
<footer class="footer">
  <img src="assets/branding/deercamp-footer.png" class="footer-logo">
  <p>Built for the Tradition</p>
</footer>

<script>
const data = JSON.parse(localStorage.getItem("campData"));

// HEADER DATA
document.getElementById("campName").innerText = data.name;
document.getElementById("campLocation").innerText =
  data.location + " • Est. " + data.established;

// HERO
document.getElementById("heroImage").src =
  "assets/heroes/" + data.hero;

// MEMBERS INLINE (ON PLANK)
const membersDiv = document.getElementById("campMembers");
data.members.forEach(m => {
  const span = document.createElement("span");
  span.innerText = m.trim();
  membersDiv.appendChild(span);
});

// TRADITIONS
const traditionsList = document.getElementById("traditionsList");
data.traditions.forEach(t => {
  const li = document.createElement("li");
  li.innerText = t.trim();
  traditionsList.appendChild(li);
});

// MEMORIES
const memoriesList = document.getElementById("memoriesList");
data.memories.forEach(m => {
  const li = document.createElement("li");
  li.innerText = m.trim();
  memoriesList.appendChild(li);
});
</script>

</body>
</html>
