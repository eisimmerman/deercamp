<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Build Your DeerCamp</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#e6dccd;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

/* form */

form{
background:#f5efe4;
padding:30px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.15);
}

label{
display:block;
margin-top:18px;
font-weight:600;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
min-height:80px;
}

button{
margin-top:24px;
padding:14px;
background:#7a5636;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
width:100%;
}

/* preview frame */

.preview{

background:#f3ecdf;
border-radius:28px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
overflow:hidden;

}

/* banner */

.banner{

background:#7b5a38;
color:white;
text-align:center;
padding:16px;

}

.banner h1{

margin:0;
font-size:28px;

}

.banner .meta{

font-size:14px;
opacity:.9;

}

.members{

font-size:14px;
margin-top:6px;

}

/* hero */

.hero{

width:100%;
height:240px;
object-fit:cover;

}

/* traditions */

.content{

padding:24px;

}

.content h2{

margin-top:0;

}

</style>

</head>

<body>

<div class="container">

<!-- BUILDER FORM -->

<form id="campForm">

<h2>Build Your DeerCamp</h2>

<label>Camp Name</label>
<input id="campName">

<label>Location</label>
<input id="campLocation">

<label>Established Year</label>
<input id="campEstablished">

<label>Camp Style</label>

<select id="campHero">

<option value="classic.jpg">Classic Deer Camp</option>
<option value="pines.jpg">Pine Forest Camp</option>
<option value="cabin.jpg">Cabin Camp</option>

</select>

<label>Members (comma separated)</label>
<input id="campMembers">

<label>Traditions (one per line)</label>
<textarea id="campTraditions"></textarea>

<button type="submit">Generate My DeerCamp</button>

</form>

<!-- LIVE PREVIEW -->

<div class="preview">

<div class="banner">

<h1 id="previewName">Your Camp Name</h1>

<div id="previewMeta" class="meta">
Location • Est.
</div>

<div id="previewMembers" class="members"></div>

</div>

<img id="previewHero" class="hero" src="assets/heroes/classic.jpg">

<div class="content">

<h2>Camp Traditions</h2>

<ul id="previewTraditions"></ul>

</div>

</div>

</div>

<script>

const nameInput = document.getElementById("campName");
const locationInput = document.getElementById("campLocation");
const yearInput = document.getElementById("campEstablished");
const heroInput = document.getElementById("campHero");
const membersInput = document.getElementById("campMembers");
const traditionsInput = document.getElementById("campTraditions");

/* preview elements */

const previewName = document.getElementById("previewName");
const previewMeta = document.getElementById("previewMeta");
const previewMembers = document.getElementById("previewMembers");
const previewHero = document.getElementById("previewHero");
const previewTraditions = document.getElementById("previewTraditions");

/* update preview */

function updatePreview(){

previewName.innerText = nameInput.value || "Your Camp Name";

previewMeta.innerText =
(locationInput.value || "Location") +
" • Est. " +
(yearInput.value || "Year");

previewMembers.innerText = membersInput.value
.split(",")
.map(m=>m.trim())
.filter(Boolean)
.join(" • ");

previewHero.src = "assets/heroes/" + heroInput.value;

/* traditions */

previewTraditions.innerHTML="";

traditionsInput.value
.split("\n")
.map(t=>t.trim())
.filter(Boolean)
.forEach(t=>{

const li = document.createElement("li");
li.textContent = t;
previewTraditions.appendChild(li);

});

}

/* watch inputs */

[
nameInput,
locationInput,
yearInput,
heroInput,
membersInput,
traditionsInput

].forEach(input => {

input.addEventListener("input",updatePreview);

});

/* generate camp */

document.getElementById("campForm").addEventListener("submit",function(e){

e.preventDefault();

const campData = {

name:nameInput.value,
location:locationInput.value,
established:yearInput.value,
hero:heroInput.value,
members:membersInput.value.split(",").map(m=>m.trim()),
traditions:traditionsInput.value.split("\n").map(t=>t.trim())

};

localStorage.setItem("previewCamp",JSON.stringify(campData));

window.location="camp.html?preview=true";

});

</script>

</body>
</html>
