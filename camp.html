<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeerCamp</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<header class="camp-header">
  <div class="header-inner">

    <div class="header-left">
      <img src="assets/branding/deer-track.png" class="deer-icon"/>
    </div>

    <div class="header-center">
      <div class="camp-title" id="campName">Camp Name</div>
      <div class="camp-meta" id="campLocation"></div>
      <div id="campMembers" class="camp-members"></div>
    </div>

    <div class="header-right">
      <button id="menuToggle" class="menu-btn">☰ Menu</button>
    </div>

  </div>

  <nav id="menu" class="menu hidden">
    <a href="#CampMap">CampMap</a>
    <a href="#CampMemories">CampMemories</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero" id="heroImage">

  <!-- 🔥 SHARE BUTTON -->
  <button id="shareBtn" class="menu-btn" style="position:absolute; top:10px; right:10px;">
    Share
  </button>

  <!-- HIDDEN FILE INPUT -->
  <input type="file" id="heroUpload" accept="image/*" hidden>

</div>

<!-- BEST STAND -->
<div class="best-stand" id="bestStandBox">
  🏆 Best Stand: No data yet
</div>

<div class="content">

  <div id="CampMap" class="section">
    <h2>CampMap</h2>
    <div class="map-container">
      <img id="campMapImage" class="camp-map"/>
      <div id="mapPins"></div>
    </div>
  </div>

  <div id="CampMemories" class="section">
    <h2>CampMemories</h2>
    <ul id="memoriesList"></ul>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <img src="assets/branding/deercamp-footer.png"/>
</div>

<script>

async function loadCamp(){

  const params = new URLSearchParams(window.location.search);
  const slug = params.get("camp") || "red-oak-camp";

  // 🔥 CHECK LOCAL STORAGE FIRST
  if(localStorage.getItem("camp-" + slug)){
    const data = JSON.parse(localStorage.getItem("camp-" + slug));
    renderCamp(data, slug);
    return;
  }

  // FALLBACK TO JSON
  const res = await fetch("data/" + slug + ".json");
  const data = await res.json();

  renderCamp(data, slug);
}

function renderCamp(data, slug){

  // TITLE
  document.getElementById("campName").innerText = data.name;
  document.getElementById("campLocation").innerText =
    data.location + " • Est. " + data.established;

  // MEMBERS
  const members = document.getElementById("campMembers");
  members.innerHTML = "";
  data.members?.forEach(m => {
    const span = document.createElement("span");
    span.className = "member-pill";
    span.innerText = m;
    members.appendChild(span);
  });

  // HERO
  const heroEl = document.getElementById("heroImage");

  if(data.hero && data.hero.startsWith("data:")){
    heroEl.style.backgroundImage = "url('" + data.hero + "')";
  }else{
    let heroFile = data.hero || "red-oak.jpg";
    heroEl.style.backgroundImage = "url('assets/heroes/" + heroFile + "')";
  }

  heroEl.style.backgroundSize = "cover";
  heroEl.style.backgroundPosition = "center";
  heroEl.style.backgroundRepeat = "no-repeat";

  // MAP
  if(data.map){
    document.getElementById("campMapImage").src = data.map;
  }

  renderPins(data);
  updateBestStand(data);

  // MEMORIES
  const list = document.getElementById("memoriesList");
  list.innerHTML = "";
  data.memories?.forEach(m => {
    const li = document.createElement("li");
    li.innerText = m;
    list.appendChild(li);
  });

  setupHeroUpload(slug);
}

function renderPins(data){
  const container = document.getElementById("mapPins");
  container.innerHTML = "";

  if(!data.stands) return;

  data.stands.forEach(stand => {
    const pin = document.createElement("div");
    pin.className = "map-pin";

    pin.style.left = stand.x + "%";
    pin.style.top = stand.y + "%";

    container.appendChild(pin);
  });
}

function updateBestStand(data){

  if(!data.stands) return;

  function score(s){
    let score = 0;
    let notes = (s.notes || "").toLowerCase();

    if(notes.includes("morning")) score += 3;
    if(notes.includes("evening")) score += 3;
    if(notes.includes("water")) score += 2;
    if(notes.includes("movement")) score += 2;
    if(notes.includes("rut")) score += 3;

    return score;
  }

  let best = data.stands[0];
  let bestScore = score(best);

  data.stands.forEach(s=>{
    let sScore = score(s);
    if(sScore > bestScore){
      best = s;
      bestScore = sScore;
    }
  });

  document.getElementById("bestStandBox").innerText =
    "🏆 Best Stand: " + best.name;
}

// HERO UPLOAD
function setupHeroUpload(slug){

  const hero = document.getElementById("heroImage");
  const input = document.getElementById("heroUpload");

  hero.onclick = () => input.click();

  input.onchange = function(){
    const file = this.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
      hero.style.backgroundImage = "url('" + e.target.result + "')";

      if(slug){
        let data = JSON.parse(localStorage.getItem("camp-" + slug));
        data.hero = e.target.result;
        localStorage.setItem("camp-" + slug, JSON.stringify(data));
      }
    };

    reader.readAsDataURL(file);
  };
}

// SHARE
document.getElementById("shareBtn").onclick = function(){
  navigator.clipboard.writeText(window.location.href);
  alert("Link copied!");
};

// MENU
document.getElementById("menuToggle").onclick = () => {
  document.getElementById("menu").classList.toggle("hidden");
};

loadCamp();

</script>

</body>
</html>
