<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Build Your DeerCamp</title>

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#121212;
color:#ffffff;
display:flex;
justify-content:center;
padding:40px;
}

.container{
max-width:600px;
width:100%;
}

h1{
text-align:center;
margin-bottom:20px;
}

p{
text-align:center;
margin-bottom:30px;
color:#ccc;
}

form{
display:flex;
flex-direction:column;
gap:16px;
}

input,select{
padding:12px;
font-size:16px;
border-radius:6px;
border:none;
}

button{
padding:14px;
font-size:18px;
background:#b33a2b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#d94b3b;
}

</style>

</head>

<body>

<div class="container">

<h1>Build Your DeerCamp in 5 Minutes</h1>

<p>Create your camp and start preserving your hunting memories.</p>

<form id="builderForm">

<input
type="text"
placeholder="Camp Name"
required
>

<input
type="text"
placeholder="County"
required
>

<select required>
<option value="">Select State</option>
<option>Wisconsin</option>
<option>Michigan</option>
<option>Minnesota</option>
<option>Pennsylvania</option>
<option>New York</option>
</select>

<input
type="email"
placeholder="Email Address"
required
>

<select>
<option>Venison Chili</option>
<option>Camp Breakfast Skillet</option>
<option>Backstrap Dinner</option>
</select>

<select>
<option>North Ridge Stand</option>
<option>Swamp Edge Stand</option>
<option>Old Oak Stand</option>
<option>Logging Road Stand</option>
</select>

<select>
<option>First Coffee</option>
<option>Opening Morning</option>
<option>Campfire Stories</option>
</select>

<button type="submit">Create My DeerCamp</button>

</form>

</div>

</body>
</html>
