<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#0f0f0f;
color:white;
}

.header{
text-align:center;
padding:40px 20px;
background:#1c1c1c;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.location{
color:#bbb;
font-size:18px;
}

.section{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.card{
background:#1c1c1c;
border-radius:12px;
padding:30px;
margin-bottom:30px;
}

.card h2{
margin-top:0;
}

.button{
display:inline-block;
padding:14px 20px;
background:#b33a2b;
color:white;
text-decoration:none;
border-radius:6px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">

<h1 id="campName">Your DeerCamp</h1>

<div class="location" id="campLocation">
County, State
</div>

</div>

<div class="section">

<div class="card">

<h2>Camp Traditions</h2>

<p id="recipe">
Venison Chili
</p>

</div>

<div class="card">

<h2>Featured Deer Stand</h2>

<p id="stand">
North Ridge Stand
</p>

</div>

<div class="card">

<h2>Camp Memories</h2>

<p>
Memories recorded in the DeerCamp app will appear here.
</p>

<a class="button" href="/build">
Create Your Own DeerCamp
</a>

</div>

</div>

<script>

/* Extract camp slug from URL */

const path = window.location.pathname.split("/");

const campSlug = path[path.length - 1];

/* Convert slug back to name */

const campName = campSlug
.replace(/-/g," ")
.replace(/\b\w/g,c=>c.toUpperCase());

document.getElementById("campName").innerText = campName;

</script>

</body>

</html>
