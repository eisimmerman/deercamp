<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- HEADER -->

<header class="camp-header">

  <div class="header-inner">

    <img src="assets/textures/hoof.png" class="hoof">

    <div class="camp-title-block">
      <h1>Red Oak Camp</h1>
      <p>Northern Wisconsin • Est. 1972</p>

      <div class="header-members">
        <span>Ben</span>
        <span>Dave</span>
        <span>Rick</span>
        <span>Tyler</span>
      </div>
    </div>

    <div class="menu" onclick="toggleMenu()">☰ Menu</div>

  </div>

  <div id="dropdown" class="dropdown">
    <div onclick="scrollToSection('map')">Camp Map</div>
    <div onclick="scrollToSection('memories')">Memories</div>
  </div>

</header>

<!-- HERO -->

<section class="hero">
  <img src="assets/heroes/red-oak.jpg">
</section>

<!-- CONTENT -->

<main class="content">

  <!-- MAP -->
  <section id="map">

    <h2>Camp Map</h2>

    <div class="map-container">

      <!-- MAP IMAGE -->
      <img src="assets/maps/red-oak-map.jpg" class="map-image">

      <!-- 🔥 DEBUG PINS (WILL BE VISIBLE NO MATTER WHAT) -->
      <div class="map-pin pin-north" onclick="openModal('north')">📍</div>
      <div class="map-pin pin-east" onclick="openModal('east')">🦌</div>

    </div>

  </section>

  <!-- MEMORIES -->
  <section id="memories">
    <h2>Camp Memories</h2>
    <ul>
      <li>Snowstorm hunt of 1998 — three bucks before noon.</li>
      <li>Ben’s first buck at sunrise from North Ridge.</li>
      <li>Rick’s legendary miss at 10 yards.</li>
    </ul>
  </section>

</main>

<!-- MODAL -->

<div id="mapModal" class="map-modal">

  <div class="map-modal-content">

    <span class="close-btn" onclick="closeModal()">✕</span>

    <h2 id="modalTitle"></h2>
    <p id="modalDescription"></p>

  </div>

</div>

<!-- FOOTER -->

<footer class="footer">
  <img src="assets/branding/deercamp-footer.png" class="footer-img">
</footer>

<!-- JS -->

<script>

function toggleMenu(){
  const menu = document.getElementById("dropdown");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({ behavior: "smooth" });
  document.getElementById("dropdown").style.display = "none";
}

function openModal(type){

  const modal = document.getElementById("mapModal");
  const title = document.getElementById("modalTitle");
  const desc = document.getElementById("modalDescription");

  if(type === "north"){
    title.innerText = "North Ridge Stand";
    desc.innerText = "Best morning movement along ridge.";
  }

  if(type === "east"){
    title.innerText = "East Ladder Stand";
    desc.innerText = "Strong evening funnel activity.";
  }

  modal.style.display = "block";
}

function closeModal(){
  document.getElementById("mapModal").style.display = "none";
}

</script>

</body>
</html>
