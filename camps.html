<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp Directory</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#e6dccd;
color:#2e2a25;
}

.wrap{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:40px;
}

/* CAMP GRID */

.camp-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:24px;
}

/* CAMP CARD */

.camp-card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,.15);
cursor:pointer;
transition:transform .15s, box-shadow .15s;
}

.camp-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 22px rgba(0,0,0,.2);
}

.camp-card img{
width:100%;
height:170px;
object-fit:cover;
display:block;
}

/* INFO */

.camp-info{
padding:16px;
}

.camp-name{
font-size:20px;
font-weight:700;
}

.camp-location{
opacity:.7;
margin-top:4px;
font-size:15px;
}

</style>

</head>

<body>

<div class="wrap">

<h1>DeerCamp Directory</h1>

<div id="campGrid" class="camp-grid"></div>

</div>


<script>

fetch("/camps/index.json")

.then(res => res.json())

.then(camps => {

const grid = document.getElementById("campGrid");

camps.forEach(camp => {

const card = document.createElement("div");
card.className="camp-card";

card.onclick = () => {
window.location = "/camp.html?camp=" + camp.slug;
};

card.innerHTML = `
<img src="/assets/heroes/${camp.hero}" alt="${camp.name}">
<div class="camp-info">
<div class="camp-name">${camp.name}</div>
<div class="camp-location">${camp.location || ""}</div>
</div>
`;

grid.appendChild(card);

});

});

</script>

</body>
</html>
