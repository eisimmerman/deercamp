<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp Directory</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#e6dccd;
color:#2e2a25;
}

.wrap{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:40px;
}

/* GRID */

.camp-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:24px;
}

/* CARD */

.camp-card{
position:relative;
border-radius:16px;
overflow:hidden;
cursor:pointer;
box-shadow:0 6px 18px rgba(0,0,0,.18);
transition:transform .18s, box-shadow .18s;
}

.camp-card:hover{
transform:translateY(-6px);
box-shadow:0 12px 26px rgba(0,0,0,.25);
}

/* IMAGE */

.camp-image{
position:relative;
height:220px;
overflow:hidden;
}

.camp-image img{
width:100%;
height:100%;
object-fit:cover;
display:block;
transform:scale(1.05);
transition:transform .3s;
}

.camp-card:hover img{
transform:scale(1.12);
}

/* DARK OVERLAY */

.image-overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:linear-gradient(to bottom, rgba(0,0,0,.15), rgba(0,0,0,.65));
}

/* CAMP NAME ON IMAGE */

.camp-title{
position:absolute;
bottom:18px;
left:18px;
color:white;
}

.camp-title h2{
margin:0;
font-size:22px;
font-weight:700;
}

.camp-title p{
margin:4px 0 0;
font-size:14px;
opacity:.85;
}

/* ESTABLISHED BADGE */

.est-badge{
position:absolute;
top:12px;
left:12px;
background:rgba(0,0,0,.7);
color:white;
padding:5px 10px;
font-size:12px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="wrap">

<h1>DeerCamp Directory</h1>

<div id="campGrid" class="camp-grid"></div>

</div>


<script>

fetch("/camps/index.json")

.then(res => res.json())

.then(camps => {

const grid = document.getElementById("campGrid");

camps.forEach(camp => {

const card = document.createElement("div");
card.className="camp-card";

card.onclick = () => {
window.location = "/camp.html?camp=" + camp.slug;
};

card.innerHTML = `

<div class="camp-image">

<img src="/assets/heroes/${camp.hero}" alt="${camp.name}">

<div class="image-overlay"></div>

${camp.established ? `<div class="est-badge">Est. ${camp.established}</div>` : ""}

<div class="camp-title">

<h2>${camp.name}</h2>

<p>${camp.location || ""}</p>

</div>

</div>

`;

grid.appendChild(card);

});

});

</script>

</body>
</html>
