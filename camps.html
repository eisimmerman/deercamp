<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp Directory</title>

<link rel="stylesheet" href="style.css">

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#cfc3af;
margin:0;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.directory{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,.15);
transition:transform .25s ease, box-shadow .25s ease;
cursor:pointer;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 14px 30px rgba(0,0,0,.25);
}

.card-hero{
position:relative;
height:200px;
overflow:hidden;
}

.card-hero img{
width:100%;
height:100%;
object-fit:cover;
}

.est-badge{
position:absolute;
top:12px;
left:12px;
background:rgba(0,0,0,.7);
color:white;
padding:6px 10px;
font-size:12px;
border-radius:6px;
}

.view-btn{
position:absolute;
bottom:12px;
right:12px;
background:white;
padding:6px 12px;
border-radius:8px;
font-size:13px;
box-shadow:0 3px 10px rgba(0,0,0,.2);
}

.card-body{
padding:20px;
}

.card-title{
font-size:20px;
font-weight:600;
margin-bottom:4px;
}

.card-location{
color:#666;
font-size:15px;
}

</style>

</head>

<body>

<h1>DeerCamp Directory</h1>

<div id="directory" class="directory"></div>

<script>

fetch("camps/index.json")
.then(res => res.json())
.then(camps => {

const container = document.getElementById("directory")

camps.forEach(camp => {

const card = document.createElement("div")
card.className = "card"

card.innerHTML = `

<div class="card-hero">

<img src="assets/heroes/${camp.hero}">

<div class="est-badge">
Est. ${camp.established}
</div>

<div class="view-btn">
View Camp
</div>

</div>

<div class="card-body">

<div class="card-title">
${camp.name}
</div>

<div class="card-location">
${camp.location}
</div>

</div>

`

card.onclick = () => {
window.location = "camp.html?camp=" + camp.slug
}

container.appendChild(card)

})

})

</script>

</body>
</html>
