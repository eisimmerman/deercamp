<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp Directory</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#e6dccd;
color:#2e2a25;
}

.wrap{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:40px;
}

/* GRID */

.camp-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:24px;
}

/* CARD */

.camp-card{
position:relative;
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,.15);
cursor:pointer;
transition:transform .15s, box-shadow .15s;
}

.camp-card:hover{
transform:translateY(-6px);
box-shadow:0 10px 22px rgba(0,0,0,.2);
}

.camp-image{
position:relative;
height:170px;
overflow:hidden;
}

.camp-image img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* IMAGE OVERLAY */

.image-overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:linear-gradient(to bottom, rgba(0,0,0,.1), rgba(0,0,0,.5));
}

/* ESTABLISHED BADGE */

.est-badge{
position:absolute;
top:12px;
left:12px;
background:rgba(0,0,0,.7);
color:white;
padding:4px 10px;
font-size:12px;
border-radius:6px;
}

/* VIEW BUTTON */

.view-btn{
position:absolute;
bottom:12px;
right:12px;
background:white;
padding:6px 12px;
font-size:13px;
border-radius:6px;
opacity:0;
transition:opacity .2s;
}

.camp-card:hover .view-btn{
opacity:1;
}

/* INFO */

.camp-info{
padding:16px;
}

.camp-name{
font-size:20px;
font-weight:700;
}

.camp-location{
opacity:.7;
margin-top:4px;
font-size:15px;
}

</style>

</head>

<body>

<div class="wrap">

<h1>DeerCamp Directory</h1>

<div id="campGrid" class="camp-grid"></div>

</div>


<script>

fetch("/camps/index.json")

.then(res => res.json())

.then(camps => {

const grid = document.getElementById("campGrid");

camps.forEach(camp => {

const card = document.createElement("div");
card.className="camp-card";

card.onclick = () => {
window.location = "/camp.html?camp=" + camp.slug;
};

card.innerHTML = `

<div class="camp-image">

<img src="/assets/heroes/${camp.hero}" alt="${camp.name}">

<div class="image-overlay"></div>

${camp.established ? `<div class="est-badge">Est. ${camp.established}</div>` : ""}

<div class="view-btn">View Camp</div>

</div>

<div class="camp-info">

<div class="camp-name">${camp.name}</div>

<div class="camp-location">${camp.location || ""}</div>

</div>

`;

grid.appendChild(card);

});

});

</script>

</body>
</html>
