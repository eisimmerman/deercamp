<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp Directory</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#cfc3af;
padding:40px;
}

/* header */

h1{
text-align:center;
margin-bottom:40px;
font-family:Georgia,serif;
}

/* grid */

.directory{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
max-width:1100px;
margin:auto;
}

/* card */

.card{
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.25);
cursor:pointer;
transition:transform .25s ease, box-shadow .25s ease;
background:#000;
}

.card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 20px 40px rgba(0,0,0,.35);
}

/* hero */

.card-hero{
position:relative;
height:220px;
overflow:hidden;
}

.card-hero img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

/* image gradient */

.card-hero::after{
content:"";
position:absolute;
bottom:0;
left:0;
right:0;
height:50%;
background:linear-gradient(transparent,rgba(0,0,0,.65));
}

/* camp name overlay */

.card-name{
position:absolute;
bottom:16px;
left:18px;
color:white;
font-family:Georgia,serif;
font-size:24px;
z-index:2;
text-shadow:0 2px 6px rgba(0,0,0,.6);
}

/* established badge */

.est{
position:absolute;
top:12px;
left:12px;
background:rgba(0,0,0,.75);
color:white;
padding:6px 10px;
border-radius:6px;
font-size:13px;
z-index:2;
}

/* parchment bottom */

.card-body{
background-image:
linear-gradient(rgba(255,255,255,.85),rgba(255,255,255,.85)),
url("assets/textures/parchment.jpg");
background-size:cover;
padding:16px 20px;
}

/* location */

.card-location{
color:#5a4632;
font-size:15px;
}

/* mobile */

@media(max-width:700px){

body{
padding:20px;
}

}

</style>

</head>

<body>

<h1>DeerCamp Directory</h1>

<div id="directory" class="directory"></div>

<script>

fetch("camps/index.json")

.then(res => res.json())

.then(camps => {

const container = document.getElementById("directory")

camps.forEach(camp => {

const card = document.createElement("div")

card.className = "card"

card.innerHTML = `

<div class="card-hero">

<img src="assets/heroes/${camp.hero}" 
onerror="this.src='assets/heroes/classic.jpg'">

<div class="est">
Est. ${camp.established}
</div>

<div class="card-name">
${camp.name}
</div>

</div>

<div class="card-body">

<div class="card-location">
${camp.location}
</div>

</div>

`

card.onclick = () => {

window.location.href =
"camp.html?camp=" + encodeURIComponent(camp.slug)

}

container.appendChild(card)

})

})

</script>

</body>
</html>
