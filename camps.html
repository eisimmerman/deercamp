<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DeerCamp Directory</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#cfc3af;
padding:40px;
}

h1{
text-align:center;
margin-bottom:40px;
}

/* grid */

.directory{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
max-width:1100px;
margin:auto;
}

/* camp card */

.card{

background:#f4efe5;
border-radius:16px;
overflow:hidden;

box-shadow:0 8px 20px rgba(0,0,0,.2);

cursor:pointer;

transition:transform .25s ease, box-shadow .25s ease;

}

.card:hover{
transform:translateY(-6px);
box-shadow:0 16px 30px rgba(0,0,0,.3);
}

/* hero image */

.card-hero{
position:relative;
height:200px;
overflow:hidden;
}

.card-hero img{
width:100%;
height:100%;
object-fit:cover;
}

/* established badge */

.est{

position:absolute;
top:12px;
left:12px;

background:rgba(0,0,0,.7);
color:white;

padding:6px 10px;

border-radius:6px;

font-size:13px;

}

/* parchment label */

.card-body{

background-image:
linear-gradient(rgba(255,255,255,.85),rgba(255,255,255,.85)),
url("assets/textures/parchment.jpg");

background-size:cover;

padding:20px;

}

.card-title{

font-family:Georgia,serif;

font-size:22px;

margin-bottom:6px;

color:#3d2a18;

}

.card-location{

color:#5a4632;

font-size:15px;

}

</style>

</head>

<body>

<h1>DeerCamp Directory</h1>

<div id="directory" class="directory"></div>

<script>

fetch("camps/index.json")

.then(res => res.json())

.then(camps => {

const container = document.getElementById("directory")

camps.forEach(camp => {

const card = document.createElement("div")

card.className = "card"

card.innerHTML = `

<div class="card-hero">

<img src="assets/heroes/${camp.hero}">

<div class="est">
Est. ${camp.established}
</div>

</div>

<div class="card-body">

<div class="card-title">
${camp.name}
</div>

<div class="card-location">
${camp.location}
</div>

</div>

`

card.onclick = () => {

window.location = "camp.html?camp=" + camp.slug

}

container.appendChild(card)

})

})

</script>

</body>
</html>
