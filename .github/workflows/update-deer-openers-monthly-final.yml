name: update-deer-openers-monthly

on:
  workflow_dispatch:
  schedule:
    - cron: "5 8 1 * *"
      timezone: "America/Chicago"

permissions:
  contents: write

jobs:
  update-openers:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run Wisconsin and Minnesota opener updater
        run: node scripts/update-deer-openers.mjs

      - name: Commit and push if opener data changed
        shell: bash
        run: |
          if git diff --quiet -- data/us-state-deer-openers.json; then
            echo "No opener data changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/us-state-deer-openers.json
          git commit -m "Update deer opener data"
          git push
