<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Build Your DeerCamp</title>

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#d2c6b2;
display:flex;
justify-content:center;
padding:40px;
}

.container{
max-width:650px;
width:100%;
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

h1{
text-align:center;
margin-bottom:30px;
}

label{
display:block;
margin-top:15px;
font-weight:600;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
height:90px;
}

button{
width:100%;
margin-top:20px;
padding:14px;
border:none;
border-radius:8px;
background:#7b5734;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5e4229;
}

</style>

</head>

<body>

<div class="container">

<h1>Build Your DeerCamp</h1>

<label>Camp Name</label>
<input id="campName">

<label>Location</label>
<input id="location">

<label>Established Year</label>
<input id="established">

<label>Choose Your Camp Style</label>
<select id="style">
<option value="classic.jpg">Classic Deer Camp</option>
<option value="pines.jpg">Pine Woods Camp</option>
<option value="cabin.jpg">Cabin Camp</option>
<option value="snow.jpg">Snow Camp</option>
</select>

<label>Camp Members (comma separated)</label>
<input id="members">

<label>Camp Traditions (one per line)</label>
<textarea id="traditions"></textarea>

<button onclick="generateCamp()">
Generate My DeerCamp
</button>

</div>

<script>

function generateCamp(){

const name = document.getElementById("campName").value
const location = document.getElementById("location").value
const established = document.getElementById("established").value
const hero = document.getElementById("style").value

const members =
document.getElementById("members").value
.split(",")
.map(x=>x.trim())
.filter(Boolean)

const traditions =
document.getElementById("traditions").value
.split("\n")
.map(x=>x.trim())
.filter(Boolean)

const slug =
name.toLowerCase()
.replace(/&/g,"")
.replace(/\s+/g,"-")

const camp = {
slug,
name,
location,
established,
hero,
members,
traditions
}

localStorage.setItem("generatedCamp", JSON.stringify(camp))

window.location="camp.html?camp=preview"

}

</script>

</body>
</html>
