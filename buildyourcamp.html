<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Build Your DeerCamp</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#e6dccd;
color:#2e2a25;
}

.wrap{
max-width:800px;
margin:auto;
padding:40px 20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

form{
background:#f5efe4;
padding:30px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,.15);
}

label{
display:block;
margin-top:18px;
font-weight:600;
}

input, textarea, select{
width:100%;
padding:10px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
min-height:80px;
}

button{
margin-top:24px;
padding:12px 20px;
background:#7a5636;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#5f4228;
}

.note{
margin-top:20px;
font-size:14px;
opacity:.7;
text-align:center;
}

</style>

</head>

<body>

<div class="wrap">

<h1>Build Your DeerCamp</h1>

<form id="campForm">

<label>Camp Name</label>
<input id="campName" required>

<label>Location</label>
<input id="campLocation">

<label>Established Year</label>
<input id="campEstablished">

<label>Choose a Camp Style</label>

<select id="campHero">

<option value="classic.jpg">Classic Camp</option>
<option value="pines.jpg">Pine Forest Camp</option>
<option value="cabin.jpg">Cabin Camp</option>

</select>

<label>Members (comma separated)</label>
<input id="campMembers" placeholder="Tom, Rick, Dave">

<label>Traditions (one per line)</label>
<textarea id="campTraditions"></textarea>

<button type="submit">Generate My DeerCamp</button>

</form>

<div class="note">
Your DeerCamp will appear instantly.
</div>

</div>

<script>

document.getElementById("campForm").addEventListener("submit", function(e){

e.preventDefault();

const name = document.getElementById("campName").value;
const location = document.getElementById("campLocation").value;
const established = document.getElementById("campEstablished").value;
const hero = document.getElementById("campHero").value;

const members = document.getElementById("campMembers")
.value
.split(",")
.map(m => m.trim())
.filter(Boolean);

const traditions = document.getElementById("campTraditions")
.value
.split("\n")
.map(t => t.trim())
.filter(Boolean);

const campData = {

name:name,
location:location,
established:established,
hero:hero,
members:members,
traditions:traditions

};

localStorage.setItem("previewCamp", JSON.stringify(campData));

window.location = "/camp.html?preview=true";

});

</script>

</body>
</html>
